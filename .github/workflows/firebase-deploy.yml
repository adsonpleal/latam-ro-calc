name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # bun auto-enables --frozen-lockfile in CI; the committed bun.lock drifts from
        # package.json, so allow bun to reconcile it instead of failing the run.
        run: bun install --no-frozen-lockfile

      - name: Build
        run: bun run build

      # Pin Node 20 for the Firebase CLI. The runners now force actions onto
      # Node 24, whose networking stack regresses firebase-tools service-account
      # auth ("Premature close" fetching the OAuth token) — this broke deploys
      # even with the firebaseToolsVersion pin below, which was green on Node 20.
      # The build above uses Bun, so this only affects the deploy step's npx.
      - name: Setup Node (Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Pin the CLI: firebase-tools 15.22.2 regressed service-account auth
          # ("Premature close" fetching the OAuth token); 15.22.1 was the last
          # known-good. Bump/remove once a later release fixes it.
          firebaseToolsVersion: "15.22.1"
          channelId: live
          projectId: simulador-latam-ro
